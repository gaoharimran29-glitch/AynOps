name: Bug Report
description: Report a bug
title: "[Bug]: "
labels:
  - bug

body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce

  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
        - Critical

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. Windows 11, Ubuntu 22.04, macOS 14

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: e.g. 3.11.2