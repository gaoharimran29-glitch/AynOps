name: Thank on Close

on:
  issues:
    types: [closed]

jobs:
  thank:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Thanks for your report! This issue has been closed. Feel free to open a new one if the problem persists.`
            });