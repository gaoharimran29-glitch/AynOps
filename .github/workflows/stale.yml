name: Close Stale Issues

on:
  schedule:
    - cron: "0 0 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been marked stale due to inactivity.
            It will be closed in 7 days if no activity occurs.

          days-before-stale: 30
          days-before-close: 7